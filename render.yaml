services:
  - type: web
    name: documind-rag
    runtime: node
    buildCommand: npm install --legacy-peer-deps
    startCommand: node server.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
